<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Prescrip">
    <title>Prescrip - Timer App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#2196F3">
</head>
<body>
    <div class="container">
        <button class="btn btn-reset" id="resetBtn">Reset</button>
        
        <div class="score-container">
            <div class="score-label">Score:</div>
            <div class="score-display" id="scoreDisplay">100</div>
        </div>
        
        <div class="timer-display" id="timerDisplay">
            00:00:00
        </div>
        
        <div class="image-container">
            <img id="phaseImage" src="The_Index_Logo.png" alt="Phase Icon">
        </div>
        
        <div class="phase-text" id="phaseText">
            Working
        </div>
        
        <div class="button-container">
            <button class="btn btn-done" id="doneBtn">Done</button>
            <button class="btn btn-fail" id="failBtn">Fail</button>
        </div>
        
        <button class="btn btn-reroll" id="rerollBtn">Reroll</button>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
